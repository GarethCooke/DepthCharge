<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <title>DepthCharge concept sketch — 64×64 LED order-book display</title>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="4.375" height="4.375" patternUnits="userSpaceOnUse">
      <path d="M4.375 0 V4.375 H0" fill="none" stroke="#04060a" stroke-width="1"/>
    </pattern>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="0.28" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- backdrop plate -->
  <rect x="8" y="8" width="884" height="544" rx="24" fill="#0e1013" stroke="#22262c"/>
  <text x="36" y="40" font-size="14" font-weight="700" letter-spacing="3" fill="#e8edf3">DEPTHCHARGE<tspan font-size="12" font-weight="400" letter-spacing="0" fill="#79808b">  — concept sketch</tspan></text>

  <!-- desk shadow + feet + USB-C -->
  <ellipse cx="250" cy="420" rx="175" ry="11" fill="#000000" opacity="0.4"/>
  <polygon points="124,400 152,400 146,416 130,416" fill="#14171b"/>
  <polygon points="348,400 376,400 370,416 354,416" fill="#14171b"/>
  <rect x="236" y="403" width="28" height="8" rx="4" fill="#0b0d10" stroke="#343a41" stroke-width="1"/>

  <!-- enclosure -->
  <rect x="80" y="60" width="340" height="340" rx="20" fill="#22262c" stroke="#30363e"/>
  <rect x="88" y="63" width="324" height="2" rx="1" fill="#ffffff" opacity="0.05"/>
  <!-- rotary encoder on right edge -->
  <rect x="414" y="294" width="20" height="32" rx="6" fill="#2a3037" stroke="#3a414a"/>
  <line x1="417" y1="302" x2="431" y2="302" stroke="#171b1f" stroke-width="1.4"/>
  <line x1="417" y1="310" x2="431" y2="310" stroke="#171b1f" stroke-width="1.4"/>
  <line x1="417" y1="318" x2="431" y2="318" stroke="#171b1f" stroke-width="1.4"/>
  <!-- bezel details -->
  <text x="116" y="389" font-size="8.5" font-weight="600" letter-spacing="2.5" fill="#59616b">IGUANAWARE</text>
  <circle cx="378" cy="385" r="4" fill="#35e0ff" opacity="0.18"/>
  <circle cx="378" cy="385" r="1.8" fill="#35e0ff" opacity="0.9"/>

  <!-- recessed frame + screen -->
  <rect x="106" y="86" width="288" height="288" rx="8" fill="#0a0c10" stroke="#2e343c"/>
  <rect x="110" y="90" width="280" height="280" rx="4" fill="#04060a"/>

  <!-- header row -->
  <g font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13" font-weight="600">
    <text x="116" y="105" fill="#d5efe3" letter-spacing="1">BTC-USD</text>
    <polygon points="350,104 358,104 354,96" fill="#2fe38c"/>
    <text x="386" y="105" fill="#ffb454" text-anchor="end">64,213</text>
  </g>

  <!-- asks (red, stacking down toward the touch) -->
  <g fill="#ff5252">
    <rect x="116" y="120" width="72" height="3.2" opacity="0.30"/>
    <rect x="116" y="124.4" width="95" height="3.2" opacity="0.32"/>
    <rect x="116" y="128.8" width="60" height="3.2" opacity="0.34"/>
    <rect x="116" y="133.2" width="130" height="3.2" opacity="0.36"/>
    <rect x="116" y="137.6" width="88" height="3.2" opacity="0.38"/>
    <rect x="116" y="142" width="105" height="3.2" opacity="0.41"/>
    <rect x="116" y="146.4" width="74" height="3.2" opacity="0.44"/>
    <rect x="116" y="150.8" width="150" height="3.2" opacity="0.47"/>
    <rect x="116" y="155.2" width="96" height="3.2" opacity="0.50"/>
    <rect x="116" y="159.6" width="68" height="3.2" opacity="0.53"/>
    <rect x="116" y="164" width="118" height="3.2" opacity="0.57"/>
    <rect x="116" y="168.4" width="82" height="3.2" opacity="0.61"/>
    <rect x="116" y="172.8" width="140" height="3.2" opacity="0.65"/>
    <rect x="116" y="177.2" width="100" height="3.2" opacity="0.70"/>
    <rect x="116" y="181.6" width="76" height="3.2" opacity="0.75"/>
    <rect x="116" y="186" width="160" height="3.2" opacity="0.80"/>
    <rect x="116" y="190.4" width="92" height="3.2" opacity="0.85"/>
    <rect x="116" y="194.8" width="120" height="3.2" opacity="0.90"/>
    <rect x="116" y="199.2" width="84" height="3.2" opacity="0.95"/>
    <rect x="116" y="203.6" width="66" height="3.2" opacity="1"/>
  </g>

  <!-- trade print flashing in the spread -->
  <rect x="112" y="210.9" width="58" height="6.2" rx="2" fill="#ffffff" opacity="0.12"/>
  <rect x="116" y="212.4" width="48" height="3.2" fill="#ffffff" filter="url(#glow)"/>

  <!-- bids (green, stacking down away from the touch) -->
  <g fill="#2fe38c">
    <rect x="116" y="221.2" width="58" height="3.2" opacity="1"/>
    <rect x="116" y="225.6" width="90" height="3.2" opacity="0.95"/>
    <rect x="116" y="230" width="70" height="3.2" opacity="0.90"/>
    <rect x="116" y="234.4" width="112" height="3.2" opacity="0.85"/>
    <rect x="116" y="238.8" width="86" height="3.2" opacity="0.80"/>
    <rect x="116" y="243.2" width="64" height="3.2" opacity="0.76"/>
    <rect x="116" y="247.6" width="240" height="3.2" opacity="0.55"/>
    <rect x="116" y="252" width="96" height="3.2" opacity="0.68"/>
    <rect x="116" y="256.4" width="78" height="3.2" opacity="0.64"/>
    <rect x="116" y="260.8" width="128" height="3.2" opacity="0.60"/>
    <rect x="116" y="265.2" width="88" height="3.2" opacity="0.57"/>
    <rect x="116" y="269.6" width="104" height="3.2" opacity="0.54"/>
    <rect x="116" y="274" width="72" height="3.2" opacity="0.51"/>
    <rect x="116" y="278.4" width="96" height="3.2" opacity="0.48"/>
    <rect x="116" y="282.8" width="60" height="3.2" opacity="0.45"/>
    <rect x="116" y="287.2" width="140" height="3.2" opacity="0.42"/>
    <rect x="116" y="291.6" width="82" height="3.2" opacity="0.40"/>
    <rect x="116" y="296" width="116" height="3.2" opacity="0.38"/>
    <rect x="116" y="300.4" width="94" height="3.2" opacity="0.36"/>
    <rect x="116" y="304.8" width="68" height="3.2" opacity="0.34"/>
    <rect x="116" y="309.2" width="122" height="3.2" opacity="0.32"/>
    <rect x="116" y="313.6" width="76" height="3.2" opacity="0.31"/>
    <rect x="116" y="318" width="100" height="3.2" opacity="0.30"/>
    <rect x="116" y="322.4" width="64" height="3.2" opacity="0.29"/>
  </g>

  <!-- last-price sparkline strip -->
  <line x1="112" y1="330" x2="388" y2="330" stroke="#ffffff" opacity="0.05"/>
  <polyline points="116,352 125.6,353 135.2,351 144.8,354 154.4,350 164,349 173.6,351 183.2,347 192.8,348 202.4,346 212,349 221.6,345 231.2,347 240.8,344 250.4,346 260,343 269.6,345 279.2,341 288.8,343 298.4,340 308,342 317.6,338 327.2,341 336.8,337 346.4,339 356,336 365.6,338 375.2,334 384,335" fill="none" stroke="#ffb454" stroke-width="1.6" opacity="0.85" stroke-linejoin="round"/>
  <circle cx="384" cy="335" r="2" fill="#ffb454"/>

  <!-- pixel grid + acrylic sheen -->
  <rect x="110" y="90" width="280" height="280" fill="url(#grid)"/>
  <rect x="110" y="90" width="280" height="280" rx="4" fill="url(#sheen)"/>

  <!-- leader lines -->
  <g stroke="#3d434c" stroke-width="1">
    <line x1="506" y1="92" x2="394" y2="95"/>
    <line x1="506" y1="148" x2="394" y2="160"/>
    <line x1="506" y1="208" x2="394" y2="214"/>
    <line x1="506" y1="264" x2="394" y2="266"/>
    <line x1="506" y1="320" x2="438" y2="310"/>
    <line x1="506" y1="382" x2="314" y2="404"/>
  </g>
  <g fill="#6a7280">
    <circle cx="394" cy="95" r="2"/><circle cx="394" cy="160" r="2"/><circle cx="394" cy="214" r="2"/>
    <circle cx="394" cy="266" r="2"/><circle cx="438" cy="310" r="2"/><circle cx="314" cy="404" r="2"/>
  </g>

  <!-- callouts -->
  <g font-size="13" fill="#a7afba">
    <text x="512" y="96"><tspan font-weight="600" fill="#dfe5ec">Smoked acrylic front</tspan> — the panel</text>
    <text x="512" y="113">vanishes into black when idle</text>
    <text x="512" y="152"><tspan font-weight="600" fill="#dfe5ec">64×64 P3 HUB75</tspan> · 192 mm active,</text>
    <text x="512" y="169">double-buffered render at ~30 fps</text>
    <text x="512" y="212"><tspan font-weight="600" fill="#dfe5ec">Spread</tspan> is the dark gap — trade prints</text>
    <text x="512" y="229">flash white at the touch</text>
    <text x="512" y="268"><tspan font-weight="600" fill="#dfe5ec">Bar length = resting size</tspan> — that</text>
    <text x="512" y="285">long green row is a bid wall</text>
    <text x="512" y="324"><tspan font-weight="600" fill="#dfe5ec">Rotary encoder</tspan> — symbol, venue,</text>
    <text x="512" y="341">price zoom; push to cycle</text>
    <text x="512" y="386"><tspan font-weight="600" fill="#dfe5ec">ESP32-S3 carrier</tspan> + 5 V buck behind;</text>
    <text x="512" y="403">USB-C PD below, ~2 A typical</text>
  </g>

  <text x="250" y="448" font-size="12" fill="#79808b" text-anchor="middle">≈ 210 × 210 × 34 mm — desk stand or wall hook</text>
</svg>
